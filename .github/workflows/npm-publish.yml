name: npm Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - dev
          - beta
          - stable
        default: stable
      package_name:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - core
          - persist
        default: all
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: "@zhuangtai-js"

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm release:test

      - name: Dry-run publish
        if: ${{ inputs.dry_run }}
        run: pnpm release:dry-run -- --channel ${{ inputs.channel }} --package ${{ inputs.package_name }}

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: pnpm release:publish -- --channel ${{ inputs.channel }} --package ${{ inputs.package_name }} --summary-file release-summary.json

      - name: Create GitHub Releases
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node - <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { readFileSync, writeFileSync } = require("node:fs");

          const summary = JSON.parse(readFileSync("release-summary.json", "utf8"));

          for (const release of summary.releases) {
            try {
              execFileSync("gh", ["release", "view", release.tag], { stdio: "ignore" });
              console.log(`skip: GitHub Release ${release.tag} already exists`);
              continue;
            } catch {}

            const notesFile = `${release.tag}-notes.md`;
            writeFileSync(notesFile, `${release.notes}\n`);

            const args = ["release", "create", release.tag, "--title", release.title, "--notes-file", notesFile];

            if (release.prerelease) {
              args.push("--prerelease");
            }

            execFileSync("gh", args, { stdio: "inherit" });
          }
          NODE
